name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      GO_VERSION: "1.26.1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: |
          sudo apt-get update
          sudo apt-get install -y just

      - run: just ci
